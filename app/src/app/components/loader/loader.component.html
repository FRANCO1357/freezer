@if (loading.isLoading()) {
  <div class="loader-overlay" aria-live="polite" aria-busy="true">
    <div class="loader-content">
      <img
        src="/favicons/favicon_1.png"
        alt=""
        class="loader-icon"
        width="64"
        height="64"
      />
      <p class="loader-text">Loading...</p>
    </div>
  </div>
}
