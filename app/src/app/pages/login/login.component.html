<div class="login-page min-vh-100 d-flex align-items-center justify-content-center py-4">
  <div class="container" style="max-width: 400px;">
    <div class="login-card card">
      <div class="card-body p-4">
        <h1 class="h4 fw-bold mb-1">Area riservata</h1>
        <p class="text-muted small mb-4">Accedi con le tue credenziali</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          @if (errorMessage) {
            <div class="alert alert-danger py-2 small" role="alert">{{ errorMessage }}</div>
          }

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              id="email"
              type="email"
              class="form-control"
              formControlName="email"
              autocomplete="email"
              placeholder="admin@francescomelani.com"
              [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
            />
            @if (form.get('email')?.invalid && form.get('email')?.touched) {
              <div class="invalid-feedback d-block">Inserisci un'email valida</div>
            }
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input
              id="password"
              type="password"
              class="form-control"
              formControlName="password"
              autocomplete="current-password"
              placeholder="••••••••"
              [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            />
            @if (form.get('password')?.invalid && form.get('password')?.touched) {
              <div class="invalid-feedback d-block">Obbligatoria</div>
            }
          </div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
            {{ loading ? 'Accesso in corso…' : 'Accedi' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
